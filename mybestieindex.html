<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Life is a Game (Bestie Edition)</title>
  <link rel="stylesheet" href="bestie-style.css" />
</head>
<body>

  <h1>Your Life is a Game</h1>

  <div id="avatar-container">
    <svg id="avatar-svg" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <!-- A small repeating tile = the vintage floral wallpaper texture behind the lights -->
        <pattern id="wallpaperPattern" width="14" height="14" patternUnits="userSpaceOnUse">
          <rect width="14" height="14" fill="#e9ddc8" />
          <circle cx="3" cy="3" r="1.4" fill="#caa583" />
          <circle cx="10" cy="9" r="1.4" fill="#caa583" />
        </pattern>
      </defs>

      <!-- WALL POSTER: string lights + hand-painted letters on wallpaper -->
      <g id="wall-poster">
        <rect class="poster-frame" x="205" y="15" width="75" height="95" rx="3" />
        <rect x="210" y="20" width="65" height="85" fill="url(#wallpaperPattern)" />

        <path class="lights-wire" d="M210,28 Q220,20 230,28 Q240,36 250,28 Q260,20 270,28" />
        <circle class="light-bulb light-red" cx="210" cy="28" r="2.3" />
        <circle class="light-bulb light-green" cx="220" cy="21" r="2.3" />
        <circle class="light-bulb light-blue" cx="230" cy="28" r="2.3" />
        <circle class="light-bulb light-yellow" cx="240" cy="35" r="2.3" />
        <circle class="light-bulb light-red" cx="250" cy="28" r="2.3" />
        <circle class="light-bulb light-green" cx="260" cy="21" r="2.3" />
        <circle class="light-bulb light-blue" cx="270" cy="28" r="2.3" />

        <path class="lights-wire" d="M210,64 Q220,56 230,64 Q240,72 250,64 Q260,56 270,64" />
        <circle class="light-bulb light-yellow" cx="210" cy="64" r="2.3" />
        <circle class="light-bulb light-blue" cx="220" cy="57" r="2.3" />
        <circle class="light-bulb light-red" cx="230" cy="64" r="2.3" />
        <circle class="light-bulb light-green" cx="240" cy="71" r="2.3" />
        <circle class="light-bulb light-yellow" cx="250" cy="64" r="2.3" />
        <circle class="light-bulb light-blue" cx="260" cy="57" r="2.3" />
        <circle class="light-bulb light-red" cx="270" cy="64" r="2.3" />

        <text class="poster-letter" x="218" y="52" transform="rotate(-6 218 52)">A</text>
        <text class="poster-letter" x="240" y="50" transform="rotate(4 240 50)">B</text>
        <text class="poster-letter" x="261" y="54" transform="rotate(-3 261 54)">C</text>
        <text class="poster-letter" x="218" y="86" transform="rotate(5 218 86)">X</text>
        <text class="poster-letter" x="240" y="84" transform="rotate(-4 240 84)">Y</text>
        <text class="poster-letter" x="261" y="88" transform="rotate(6 261 88)">Z</text>

        <line class="paint-drip" x1="241" y1="51" x2="241" y2="58" />
        <line class="paint-drip" x1="219" y1="87" x2="219" y2="93" />
      </g>

      <!-- LEGS -->
      <rect class="legs" x="120" y="300" width="25" height="70" rx="8" />
      <rect class="legs" x="155" y="300" width="25" height="70" rx="8" />
      <ellipse class="shoes" cx="132" cy="375" rx="18" ry="8" />
      <ellipse class="shoes" cx="167" cy="375" rx="18" ry="8" />

      <!-- HOODIE BODY -->
      <path class="hoodie" d="M100,160 Q150,140 200,160 L210,300 Q150,320 90,300 Z" />

      <!-- ARMS -->
      <path class="hoodie" d="M95,180 Q70,210 85,250 L105,245 Q100,210 115,185 Z" />
      <path class="hoodie" d="M205,180 Q230,210 215,250 L195,245 Q200,210 185,185 Z" />

      <!-- HOODIE POCKET -->
      <rect class="hoodie-dark" x="125" y="240" width="50" height="20" rx="6" />

      <!-- HOOD / NECKLINE -->
      <path class="hoodie-dark" d="M120,155 Q150,175 180,155 L175,145 Q150,160 125,145 Z" />

      <!-- LONG HAIR (only written once now - the duplicate copy was removed) -->
      <path class="hair-brown" d="M150,50 Q105,50 100,110 Q95,160 110,205 Q130,170 138,120 Q145,95 150,90 Z" />
      <path class="hair-blonde" d="M150,50 Q195,50 200,110 Q205,160 190,205 Q170,170 162,120 Q155,95 150,90 Z" />

      <!-- HEAD -->
      <circle class="skin" cx="150" cy="100" r="42" />

      <!-- FACE (added back so it doesn't look like a blank head - delete this
           block if you'd rather keep it faceless) -->
      <circle class="eye" cx="135" cy="100" r="4" />
      <circle class="eye" cx="165" cy="100" r="4" />
      <path class="mouth" d="M138,118 Q150,126 162,118" />

    </svg>
  </div>

  <div id="stats">
    <p>Level: <span id="level">1</span></p>
    <p>XP: <span id="xp">0</span></p>
  </div>

  <!-- One button per activity. Each calls addXP() with that activity's value
       from XP_VALUES in bestie-script.js, so the numbers only live in one place. -->
  <div id="xp-buttons">
    <button onclick="addXP(XP_VALUES.reading)">Reading (+100)</button>
    <button onclick="addXP(XP_VALUES.summerCamp)">SummerCamp Preperation (+300)</button>
    <button onclick="addXP(XP_VALUES.texting)">Texting my best friend all the time (+1000)</button>
  </div>

  <script src="bestie-script.js"></script>
</body>
</html>
